services:
  backend:
    build:
      context: ./backend
    container_name: requests-api
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    container_name: gestor-solicitudes-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend